# Описание сервисов, которые compose поднимает вместе.
services:
  # API-сервис текущего Go-приложения.
  api:
    # Собирать Docker-образ из Dockerfile в корне проекта.
    build: .
    # Автоматически перезапускать контейнер, если он упал.
    restart: unless-stopped
    # Пробрасываем порт только на localhost: внешний доступ извне хоста закрыт.
    ports:
      - "127.0.0.1:8080:8080"
    # Подгружаем переменные окружения из файла .env.
    env_file: .env
