services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-dms}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-dms}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ../database/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-dms}"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data

  # backend:
  #   build:
  #     context: ../backend
  #     dockerfile: Dockerfile
  #   restart: unless-stopped
  #   ports:
  #     - "127.0.0.1:${SERVER_PORT:-8081}:8081"
  #   env_file: .env
  #   depends_on:
  #     postgres:
  #       condition: service_healthy

  llm-proxy:
    build:
      context: ../services/llm-proxy
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:${LLM_PROXY_PORT:-8080}:8080"
    environment:
      PORT: "8080"
      OLLAMA_URL: ${OLLAMA_URL}
      API_KEYS: ${API_KEYS}

  # frontend:
  #   build:
  #     context: ../frontend
  #     dockerfile: Dockerfile
  #   restart: unless-stopped
  #   ports:
  #     - "127.0.0.1:3000:80"

volumes:
  pg_data:
  minio_data:
